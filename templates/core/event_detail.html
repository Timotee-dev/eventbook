{% extends "core/base.html" %}
{% block title %}Event{% endblock %}
{% block content %}
<div id="detailHero" style="aspect-ratio:21/8;background:var(--card2);position:relative;overflow:hidden">
  <div style="position:absolute;inset:0;background:linear-gradient(to top,var(--void) 20%,transparent 70%);z-index:1"></div>
</div>
<div class="container" style="padding-top:36px;padding-bottom:80px">
  <div id="detailContent" style="display:grid;grid-template-columns:1fr 360px;gap:40px;align-items:start">
    <div><div class="skeleton" style="height:44px;border-radius:8px;margin-bottom:14px"></div><div class="skeleton" style="height:14px;width:60%;border-radius:4px;margin-bottom:8px"></div><div class="skeleton" style="height:120px;border-radius:8px;margin-top:20px"></div></div>
    <div class="skeleton" style="height:320px;border-radius:20px"></div>
  </div>
</div>
<script>const SLUG='{{ slug }}';</script>
{% endblock %}
{% block extra_js %}
<script>
let qty=1, eventData=null;

async function boot() {
  const {data,ok} = await api.get(`/api/events/${SLUG}/`);
  if(!ok||!data){ document.getElementById('detailContent').innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠</div><h3>Event not found</h3><a href="/events/" class="btn btn-outline" style="margin-top:14px">Browse Events</a></div>'; return; }
  eventData = data;
  document.title = `${data.title} — EventBook`;

  // Hero
  const hero = document.getElementById('detailHero');
  if (data.banner) { const img=document.createElement('img'); img.src=data.banner; img.style.cssText='width:100%;height:100%;object-fit:cover'; hero.prepend(img); }
  else { hero.style.background='linear-gradient(135deg,var(--card2),var(--card))'; hero.insertAdjacentHTML('afterbegin',`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.12;z-index:0">${data.category_icon||'✦'}</div>`); }

  // Price
  const tts = data.ticket_types||[];
  const minPrice = tts.length ? Math.min(...tts.map(t=>parseFloat(t.price))) : parseFloat(data.base_price||0);

  document.getElementById('detailContent').innerHTML = `
    <div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <span class="badge badge-violet">${data.category||'Event'}</span>
        ${badge(data.status)}
        ${data.is_online?'<span class="badge badge-green">Online</span>':''}
      </div>
      <h1 style="font-family:var(--fd);font-size:clamp(26px,4vw,42px);font-weight:700;color:#fff;letter-spacing:-.025em;margin-bottom:16px">${data.title}</h1>
      <div style="display:flex;flex-wrap:wrap;gap:18px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:8px;font-size:14px;color:var(--muted)">📅 <strong style="color:var(--text)">${fmtDate(data.start_datetime)}</strong></div>
        <div style="display:flex;gap:8px;font-size:14px;color:var(--muted)">📍 <strong style="color:var(--text)">${data.venue_name}${data.city?', '+data.city:''}</strong></div>
        <div style="display:flex;gap:8px;font-size:14px;color:var(--muted)">👥 <strong style="color:var(--text)">Capacity: ${data.capacity}</strong></div>
        ${data.avg_rating>0?`<div style="color:var(--warn)">★ ${data.avg_rating} (${data.review_count} reviews)</div>`:''}
      </div>
      <div style="color:var(--muted);line-height:1.8;font-size:15px">${data.description.replace(/\n/g,'<br>')}</div>

      <!-- Reviews -->
      <div style="margin-top:36px">
        <h3 style="font-family:var(--fd);font-size:18px;font-weight:600;color:#fff;margin-bottom:16px">Reviews</h3>
        ${data.reviews?.length ? data.reviews.map(r=>`
          <div style="padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--rm);margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <strong style="color:#fff;font-size:14px">${r.customer}</strong>
              <span style="color:var(--warn)">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
              <span style="color:var(--dim);font-size:12px">${fmtDateShort(r.created_at)}</span>
            </div>
            <p style="color:var(--muted);font-size:13px">${r.comment||''}</p>
          </div>`).join('') : '<div class="empty" style="padding:24px"><div class="empty-icon">💬</div><p>No reviews yet.</p></div>'}

        {% if user.is_authenticated %}
        <div style="margin-top:18px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--rl)">
          <h4 style="font-family:var(--fd);font-size:15px;font-weight:600;color:#fff;margin-bottom:12px">Leave a Review</h4>
          <div style="display:flex;gap:6px;margin-bottom:10px" id="stars">
            ${[1,2,3,4,5].map(n=>`<button onclick="setStar(${n})" style="font-size:24px;background:none;border:none;cursor:pointer;transition:.2s" data-n="${n}">☆</button>`).join('')}
          </div>
          <textarea class="textarea" id="reviewText" placeholder="Share your experience…" style="min-height:80px;margin-bottom:10px"></textarea>
          <button class="btn btn-primary btn-sm" id="reviewBtn" onclick="submitReview()">Submit Review</button>
        </div>
        {% endif %}
      </div>
    </div>

    <!-- Booking Panel -->
    <div class="book-panel">
      <div class="price-big">${data.is_free?'<span style="color:var(--green)">Free</span>':'₦'+minPrice.toLocaleString('en-NG')}</div>
      <div class="price-note">${data.is_free?'No ticket required':`${tts.length>1?'from / ticket':'/ticket'}`}</div>
      <div class="chip" data-start="${data.start_datetime}" data-end="${data.end_datetime}" style="position:static;display:inline-flex;margin-bottom:16px"></div>
      ${tts.length ? `<div class="form-group"><label class="label">Ticket Type</label><select class="select" id="ttSel" onchange="updateTotal()">${tts.map(t=>`<option value="${t.id}" data-price="${t.price}" ${t.is_sold_out?'disabled':''}>${t.name} — ₦${parseFloat(t.price).toLocaleString('en-NG')} ${t.is_sold_out?'(sold out)':'('+t.remaining+' left)'}</option>`).join('')}</select></div>` : ''}
      <div class="form-group">
        <label class="label">Quantity</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-amount" id="totalAmt">${data.is_free?'Free':'₦'+minPrice.toLocaleString()}</span>
      </div>
      <button class="btn btn-primary btn-full" id="bookBtn" onclick="bookNow()" ${data.is_sold_out?'disabled':''}>
        ${data.is_sold_out?'Sold Out':data.is_free?'Register Free →':'Book Now →'}
      </button>
      <div style="margin-top:14px;text-align:center;font-size:12px;color:var(--dim)">🔒 Secure payment · Powered by Paystack · NGN</div>
    </div>`;

  initChips();
}

let star=0;
function setStar(n) {
  star=n;
  document.querySelectorAll('#stars button').forEach((b,i)=>{ b.textContent=i<n?'★':'☆'; b.style.color=i<n?'var(--warn)':''; });
}

async function submitReview() {
  if(!star){ flash('Please select a rating.','error'); return; }
  const btn=document.getElementById('reviewBtn');
  setLoading(btn,true);
  const {data,ok}=await api.post(`/api/events/${SLUG}/review/`,{rating:star,comment:document.getElementById('reviewText').value});
  setLoading(btn,false);
  if(!ok){ flash(data?.error||'Failed','error'); return; }
  flash('Review submitted!','success');
  document.getElementById('reviewBtn').closest('div').parentElement.remove();
}

function changeQty(d) { qty=Math.max(1,Math.min(10,qty+d)); document.getElementById('qtyNum').textContent=qty; updateTotal(); }

function updateTotal() {
  const sel = document.getElementById('ttSel');
  const price = sel ? parseFloat(sel.options[sel.selectedIndex]?.dataset.price||0) : parseFloat(eventData?.base_price||0);
  const total = price*qty;
  document.getElementById('totalAmt').innerHTML = total===0?'Free':'₦'+total.toLocaleString('en-NG');
}

async function bookNow() {
  {% if not user.is_authenticated %}location.href=`/login/?next=/events/${SLUG}/`; return;{% endif %}
  const btn=document.getElementById('bookBtn');
  setLoading(btn,true);
  const sel=document.getElementById('ttSel');
  const body={event_uid:eventData.uid,quantity:qty};
  if(sel) body.ticket_type_id=parseInt(sel.value);

  const {data:booking,ok:bOk}=await api.post('/api/bookings/',body);
  if(!bOk){ setLoading(btn,false); flash(booking?.error||'Booking failed','error'); return; }

  const {data:pay,ok:pOk}=await api.post('/api/payments/initialize/',{booking_uid:booking.booking.uid});
  setLoading(btn,false);
  if(!pOk){ flash(pay?.error||'Payment init failed','error'); return; }

  if(pay.free){ flash('Booking confirmed!','success'); setTimeout(()=>location.href='/my-tickets/',1200); return; }
  location.href = pay.authorization_url;
}

boot();
</script>
{% endblock %}
