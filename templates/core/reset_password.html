{% extends "core/base.html" %}{% block title %}Reset Password{% endblock %}{% block content %}
<div class="auth-page"><div class="auth-card">
<a href="/" class="nav-logo" style="margin-bottom:24px;display:inline-flex"><span class="logo-mark">◈</span> EventBook</a>
<h1 style="font-family:var(--fd);font-size:22px;font-weight:700;color:#fff;margin-bottom:6px">Set New Password</h1>
<p class="auth-sub">Choose a strong password for your account.</p>
<div class="err-box hidden" id="msg"></div>
<div class="form-group"><label class="label">New Password</label><input type="password" class="input" id="pw1" placeholder="8+ characters"></div>
<div class="form-group"><label class="label">Confirm</label><input type="password" class="input" id="pw2" placeholder="Same again"></div>
<button class="btn btn-primary btn-full" id="btn" onclick="go()">Save Password</button>
</div></div>
{% endblock %}
{% block extra_js %}<script>
async function go(){
  const pw1=document.getElementById('pw1').value, pw2=document.getElementById('pw2').value;
  if(pw1!==pw2){show('Passwords do not match.','red');return;}
  if(pw1.length<8){show('At least 8 characters.','red');return;}
  const btn=document.getElementById('btn');
  setLoading(btn,true);
  const {data,ok}=await api.post('/api/auth/password-reset/{{ token }}/',{password:pw1});
  setLoading(btn,false);
  if(!ok){show(data?.error||'Failed','red');return;}
  show('Password reset! Redirecting…','green');
  setTimeout(()=>location.href='/login/',2000);
}
function show(m,c){const e=document.getElementById('msg');e.textContent=m;e.style.color='var(--'+c+')';e.style.borderColor='rgba(0,0,0,.2)';e.classList.remove('hidden');}
</script>{% endblock %}
